<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Pengawas Ujian</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Pengaturan Cetak PDF: Otomatis membuka semua Rincian agar tercetak penuh */
    @media print { 
      .no-print { display: none !important; } 
      .print-area { width: 100%; }
      .detail-body { display: block !important; }
      .detail-toggle-icon { display: none !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-20">

  <div id="loading-overlay" class="fixed inset-0 bg-slate-950/30 backdrop-blur-sm flex items-center justify-center z-50 transition-all duration-300">
    <div class="bg-white px-6 py-4 rounded-2xl shadow-2xl flex flex-col items-center gap-3">
      <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span id="loading-text" class="text-xs font-black tracking-widest text-slate-900 uppercase mt-1">Mengunduh Jadwal...</span>
    </div>
  </div>

  <header class="bg-blue-700 text-white shadow-md no-print sticky top-0 z-40">
    <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-black tracking-tight leading-none">Jadwal Pengawas</h1>
        <p id="semester-title" class="text-[10px] text-blue-200 mt-0.5 font-bold uppercase tracking-wider">Semester Aktif</p>
      </div>
      <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-xs">
        <span class="text-sm">🎓</span>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-5">
    
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-5 no-print border border-slate-200 relative z-30">
      <label for="search-pengawas" class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">🔍 Identitas Anda</label>
      
      <div class="relative">
        <input type="text" id="search-pengawas" disabled autocomplete="off" placeholder="Sedang memuat database..." 
          class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-3.5 text-slate-900 font-bold text-sm focus:outline-hidden focus:border-blue-500 focus:bg-white transition-all cursor-not-allowed opacity-50">
        
        <button id="btn-clear" onclick="resetSearch()" class="hidden absolute right-3 top-3.5 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-6 h-6 flex items-center justify-center font-black cursor-pointer">✕</button>

        <div id="autocomplete-results" class="hidden absolute left-0 right-0 mt-2 bg-white border border-slate-200 rounded-xl shadow-xl max-h-60 overflow-y-auto overflow-x-hidden flex-col divide-y divide-slate-100">
          </div>
      </div>
      <p class="text-[9px] text-slate-400 mt-2 font-medium px-1">*Ketik minimal 3 huruf nama/kode Anda.</p>
    </div>

    <div id="jadwal-section" class="hidden print-area">
      
      <div class="flex items-center justify-between mb-4 bg-blue-50 border border-blue-100 p-3.5 rounded-2xl">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center text-blue-700 font-black text-sm border border-blue-300">
            <span id="inisial-nama">P</span>
          </div>
          <div>
            <h2 id="nama-terpilih" class="text-sm font-black text-slate-900 leading-tight truncate max-w-[200px]">Nama</h2>
            <p id="kode-terpilih" class="text-[10px] font-bold text-blue-600 mt-0.5">KID: -</p>
          </div>
        </div>
        <button onclick="window.print()" class="no-print w-10 h-10 bg-slate-800 text-white rounded-xl shadow-xs flex items-center justify-center active:scale-95 transition-all">
          🖨️
        </button>
      </div>

      <div class="no-print mb-5">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">📅 Saring Berdasarkan Hari</span>
          <span id="info-total" class="text-[10px] font-bold text-slate-500 bg-slate-200 px-2 py-0.5 rounded-md">0 Sesi</span>
        </div>
        <div id="day-filters" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 pt-1 scroll-smooth">
          </div>
      </div>

      <div id="container-kartu" class="space-y-3">
        </div>
    </div>

    <div id="empty-state" class="text-center py-20 text-slate-400 no-print flex flex-col items-center justify-center animate-in fade-in duration-500">
      <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-5 shadow-inner border border-slate-200">
        <span class="text-4xl">👋</span>
      </div>
      <h3 class="text-base font-black text-slate-700 mb-1">Selamat Datang, Pengawas!</h3>
      <p class="text-xs font-medium max-w-[250px] leading-relaxed text-slate-500">Ketik nama Anda di kolom atas untuk melihat alokasi jadwal mengawas secara instan.</p>
    </div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwfb_SBIWtuC6s5CdaXPN-GEo7HmFEoTKmXF0HBX2IOkRCNPTlIFuVW50FvrSA14ihJlw/exec";

    let database = { config: {}, pengawas: [], jadwal: [] };
    let currentJadwalFiltered = []; 
    let currentUserKode = "";       

    document.addEventListener('contextmenu', e => e.preventDefault());

    function toggleLoading(show, text = "Memuat Data...") {
      const overlay = document.getElementById('loading-overlay');
      document.getElementById('loading-text').innerText = text;
      if (show) overlay.classList.remove('hidden');
      else overlay.classList.add('hidden');
    }

    async function fetchPortalData() {
      toggleLoading(true, "Menghubungkan ke Server...");
      try {
        const res = await fetch(`${API_URL}?action=getData`);
        const result = await res.json();
        
        if(result.status === "success") {
          database = result;
          
          const searchInput = document.getElementById('search-pengawas');
          searchInput.disabled = false;
          searchInput.placeholder = "Ketik min. 3 huruf nama Anda...";
          searchInput.classList.remove('cursor-not-allowed', 'opacity-50');

          if(database.config.current_semester) {
            document.getElementById('semester-title').innerText = database.config.current_semester;
          }
        }
      } catch (err) { alert("Koneksi gagal. Pastikan sinyal internet stabil."); } 
      finally { toggleLoading(false); }
    }

    // ================= FUNGSI AUTOCOMPLETE PENCARIAN PENGAWAS =================
    const searchInput = document.getElementById('search-pengawas');
    const resultsBox = document.getElementById('autocomplete-results');
    const btnClear = document.getElementById('btn-clear');

    searchInput.addEventListener('input', function(e) {
      const keyword = e.target.value.toLowerCase().trim();
      
      // Munculkan tombol clear jika ada isinya
      if(keyword.length > 0) btnClear.classList.remove('hidden');
      else btnClear.classList.add('hidden');

      // Syarat minimal 3 huruf agar performa ringan
      if(keyword.length < 3) {
        resultsBox.classList.add('hidden');
        return;
      }

      // Filter database
      const matched = database.pengawas.filter(p => 
        p.nama.toLowerCase().includes(keyword) || p.kode.includes(keyword)
      );

      resultsBox.innerHTML = "";
      
      if(matched.length === 0) {
        resultsBox.innerHTML = `<div class="p-4 text-center text-xs font-bold text-slate-400">Tidak ada pengawas bernama "${keyword}"</div>`;
      } else {
        matched.forEach(p => {
          resultsBox.innerHTML += `
            <div onclick="eksekusiPilihPengawas('${p.kode}', '${p.nama.replace(/'/g, "\\'")}')" 
                 class="p-3.5 hover:bg-blue-50 active:bg-blue-100 cursor-pointer transition-colors flex flex-col gap-0.5">
              <span class="font-bold text-slate-800 text-sm">${p.nama}</span>
              <span class="text-[10px] font-bold text-slate-400">Kode Pengawas: ${p.kode}</span>
            </div>
          `;
        });
      }
      resultsBox.classList.remove('hidden');
      resultsBox.classList.add('flex');
    });

    // Menutup kotak hasil jika klik di luar
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
        resultsBox.classList.add('hidden');
      }
    });

    // Fungsi membersihkan pencarian
    function resetSearch() {
      searchInput.value = "";
      resultsBox.classList.add('hidden');
      btnClear.classList.add('hidden');
      document.getElementById('jadwal-section').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
      currentUserKode = "";
    }

    // ================= FUNGSI EKSEKUSI SAAT NAMA DIKLIK =================
    function eksekusiPilihPengawas(kode, nama) {
      // 1. Kunci tampilan input & sembunyikan kotak
      searchInput.value = nama;
      resultsBox.classList.add('hidden');
      currentUserKode = kode;

      toggleLoading(true, "Menyusun Jadwal...");
      
      setTimeout(() => {
        document.getElementById('nama-terpilih').innerText = nama;
        document.getElementById('kode-terpilih').innerText = `KODE IDENTITAS: ${kode}`;
        document.getElementById('inisial-nama').innerText = nama.charAt(0).toUpperCase();

        // 2. Filter jadwal HANYA yang statusnya Published
        currentJadwalFiltered = database.jadwal.filter(j => {
          const kodes = j.kode_pengawas.split(',').map(k => k.trim());
          const isUserIncluded = kodes.includes(kode);
          const isPublished = j.status && j.status.toLowerCase() === 'published';
          return isUserIncluded && isPublished;
        });

        if(currentJadwalFiltered.length === 0) {
          showEmptyJadwal();
        } else {
          document.getElementById('jadwal-section').classList.remove('hidden');
          document.getElementById('empty-state').classList.add('hidden');
          renderJadwalView("Semua"); // Render jadwal
        }
        toggleLoading(false);
      }, 300);
    }

    function showEmptyJadwal() {
      const section = document.getElementById('jadwal-section');
      const empty = document.getElementById('empty-state');
      section.classList.add('hidden');
      empty.classList.remove('hidden');
      empty.innerHTML = `
        <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mb-5 shadow-inner border border-amber-200 animate-bounce">
          <span class="text-4xl">☕</span>
        </div>
        <h3 class="text-base font-black text-amber-900 mb-1">Jadwal Kosong / Draft</h3>
        <p class="text-xs font-medium max-w-[250px] leading-relaxed text-amber-700/70">Jadwal Anda untuk saat ini belum dipublikasikan oleh Panitia, atau Anda tidak memiliki sesi aktif.</p>
      `;
    }

    // ================= FUNGSI RENDER VIEW (KARTU SUPER KOMPAK RINGKAS) =================
    function renderJadwalView(selectedHari) {
      // Pil Filter Hari
      const hariUnik = [...new Set(currentJadwalFiltered.map(j => j.hari_tanggal.replace(/\n/g, ' ')))];
      const filterContainer = document.getElementById('day-filters');
      
      let pillsHtml = `
        <button onclick="renderJadwalView('Semua')" class="whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-xs shrink-0 border ${selectedHari === 'Semua' ? 'bg-blue-600 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-200 active:bg-slate-100'}">
          Semua Hari
        </button>
      `;
      hariUnik.forEach(hari => {
        const isSelected = selectedHari === hari;
        pillsHtml += `
          <button onclick="renderJadwalView('${hari}')" class="whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-xs shrink-0 border ${isSelected ? 'bg-slate-800 text-white border-slate-900' : 'bg-white text-slate-600 border-slate-200 active:bg-slate-100'}">
            ${hari}
          </button>
        `;
      });
      filterContainer.innerHTML = pillsHtml;

      const dataToRender = selectedHari === 'Semua' 
        ? currentJadwalFiltered 
        : currentJadwalFiltered.filter(j => j.hari_tanggal.replace(/\n/g, ' ') === selectedHari);

      document.getElementById('info-total').innerText = `${dataToRender.length} Sesi Terjadwal`;

      const container = document.getElementById('container-kartu');
      container.innerHTML = "";

      const groupedData = {};
      dataToRender.forEach(j => {
        const h = j.hari_tanggal.replace(/\n/g, ' ');
        if(!groupedData[h]) groupedData[h] = [];
        groupedData[h].push(j);
      });

      for (const [hariGroup, jadwals] of Object.entries(groupedData)) {
        if(selectedHari === "Semua") {
          container.innerHTML += `
            <div class="mt-5 mb-2.5 flex items-center gap-3">
              <h3 class="font-black text-blue-800 text-[11px] uppercase tracking-wider bg-blue-100 px-3 py-1 rounded-full">${hariGroup}</h3>
              <div class="h-px bg-slate-200 flex-1"></div>
            </div>
          `;
        }

        jadwals.forEach((j, idx) => {
          const detailId = `detail-${j.no}-${idx}`;
          
          // Pencarian Partner
          const semuaKode = j.kode_pengawas.split(',').map(k => k.trim());
          const partnerKodes = semuaKode.filter(k => k !== currentUserKode && k !== "");
          
          let partnerHtml = "";
          if(partnerKodes.length > 0) {
            partnerKodes.forEach(kp => {
              const pData = database.pengawas.find(x => x.kode === kp);
              const pNama = pData ? pData.nama : "Tanpa Nama";
              partnerHtml += `
                <div class="flex items-center gap-2 py-1.5 border-b border-slate-200/50 last:border-0">
                  <div class="w-5 h-5 rounded bg-blue-100 flex items-center justify-center text-[8px] font-black text-blue-700">P</div>
                  <span class="text-[11px] font-bold text-slate-700">${pNama}</span>
                </div>
              `;
            });
          } else {
            partnerHtml = `<div class="text-[10px] text-slate-500 font-bold italic py-1">👤 Mandiri (Tanpa Partner)</div>`;
          }

          // FITUR BARU: KARTU KOMPAK DENGAN TOGGLE RINCIAN
          const card = document.createElement('div');
          card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-3 animate-in fade-in slide-in-from-bottom-2 duration-300";
          
          card.innerHTML = `
            <div onclick="toggleDetail('${detailId}', this)" class="p-3.5 flex items-center justify-between cursor-pointer active:bg-slate-50 transition-colors">
              <div>
                <div class="font-bold text-slate-900 text-[11px] mb-0.5 tracking-wide">${selectedHari === 'Semua' ? '' : hariGroup + ' • '}Sesi ${j.jam.split(' ')[0]}</div>
                <div class="text-[13px] text-blue-700 font-black">🕒 Pukul ${j.jam.substring(j.jam.indexOf('(')+1, j.jam.indexOf(')'))}</div>
              </div>
              
              <div class="flex items-center gap-1.5 text-[10px] font-bold text-slate-600 bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-lg shadow-2xs">
                <span>Rincian</span>
                <span class="detail-toggle-icon transition-transform duration-200">▼</span>
              </div>
            </div>
            
            <div id="${detailId}" class="detail-body hidden border-t border-slate-100 bg-slate-50/70 p-3.5">
              <h4 class="font-black text-sm text-slate-900 mb-2.5 leading-snug">${j.mata_kuliah}</h4>
              
              <div class="flex flex-wrap items-center gap-2 mb-3.5">
                <div class="bg-emerald-100 border border-emerald-300 text-emerald-900 px-2.5 py-1 rounded-md flex items-center gap-1.5 shadow-2xs">
                  <span class="text-xs">🚪</span>
                  <span class="font-black text-xs">${j.ruang}</span>
                </div>
                <div class="text-slate-500 font-bold text-[10px] bg-white px-2 py-1 rounded-md border border-slate-200 shadow-2xs">
                  Kls: ${j.kelas} • ${j.program_studi}
                </div>
              </div>
              
              <div class="pt-2 border-t border-slate-200/60">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-wider mb-1.5">👥 Partner Ruangan:</p>
                <div class="flex flex-col">
                  ${partnerHtml}
                </div>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      }
    }

    // Fungsi Toggle Rincian Buka Tutup
    function toggleDetail(id, headerEl) {
      const bodyEl = document.getElementById(id);
      const iconEl = headerEl.querySelector('.detail-toggle-icon');
      
      bodyEl.classList.toggle('hidden');
      iconEl.classList.toggle('rotate-180');
    }

    fetchPortalData();
  </script>
</body>
</html>
